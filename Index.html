<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Scrolling!</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .timer { font-size: 5rem; font-weight: bold; margin: 20px 0; color: #00ff88; }
        button { padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        .start { background: #00ff88; color: black; }
        .stop { background: #ff4444; color: white; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Waktunya Berhenti?</h2>
    <div class="timer" id="display">15:00</div>
    
    <button class="start" onclick="startTimer(15)">Mulai 15 Menit</button>
    <button class="stop" onclick="resetTimer()">Reset</button>

    <script>
        let timer;
        let timeLeft;

        function startTimer(minutes) {
            clearInterval(timer);
            timeLeft = minutes * 60;
            updateDisplay();
            
            // Minta izin notifikasi
            Notification.requestPermission();

            timer = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    alert("Waktu habis! Segera tutup media sosialmu.");
                    new Notification("Waktu Habis!", { body: "Sudah cukup doomscrolling-nya hari ini." });
                }
            }, 1000);
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function resetTimer() {
            clearInterval(timer);
            document.getElementById('display').innerText = "15:00";
        }
    </script>
</body>
</html>
